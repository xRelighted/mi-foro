<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Foro - Mensajes</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Mensajes del foro</h1>
            <nav>
                <a href="/index.html" class="btn-link">Escribir mensaje</a>
            </nav>
        </header>
        <main>
            <div id="messages-list" class="messages-list">
                <div class="loading">Cargando mensajes...</div>
            </div>
        </main>
    </div>
    <script>
        async function loadMessages() {
            const container = document.getElementById('messages-list');
            try {
                const response = await fetch('/api/messages');
                if (!response.ok) throw new Error('Error al cargar');
                const messages = await response.json();
                if (messages.length === 0) {
                    container.innerHTML = '<div class="no-messages">📭 No hay mensajes aún. ¡Sé el primero en escribir!</div>';
                    return;
                }
                container.innerHTML = messages.map(msg => `
                    <div class="message-card">
                        <div class="message-header">
                            <strong>${escapeHtml(msg.author)}</strong>
                            <span class="timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="message-body">${escapeHtml(msg.text)}</div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="error">❌ Error al cargar los mensajes</div>';
                console.error(error);
            }
        }

        // Escapar HTML para prevenir XSS
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Cargar mensajes al inicio y cada 10 segundos
        loadMessages();
        setInterval(loadMessages, 10000);
    </script>
</body>
</html>
